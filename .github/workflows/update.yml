name: Keiba Update

on:
  schedule:
    - cron: '0 * * * *'  # S'exécute toutes les heures
  workflow_dispatch:      # Permet de lancer manuellement

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          
      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4
          
      - name: Run Scraper
        run: python main.py
        
      - name: Deploy
        run: |
          git config --global user.name "KeibaBot"
          git config --global user.email "bot@keiba.com"
          git add index.html data.json
          mkdir -p archives
          git add archives/*.html || echo "Pas d'archive"
          git commit -m "Mise à jour News & Archives" || exit 0
          git push
