name: Keiba Update

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install cloudscraper beautifulsoup4
          
      - name: Run Scraper
        run: python main.py
        
      - name: Deploy
        run: |
          git config --global user.name "KeibaBot"
          git config --global user.email "bot@keiba.com"
          git add index.html data.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update Keiba" && git push)
